seed: 42
output_dir: artifacts/vlm/quick500_v2

model:
  model_id: /home/yaner/.cache/huggingface/hub/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
  gradient_checkpointing: true
  projection:
    in_dim: 2048
    mid_dim: 512
    out_dim: 256

data:
  data_dir: /home/yaner/kris/warehouse/DiEC/data/cifar-10-batches-py
  max_per_class: 50          # 50×10 = 500 张
  eval_max_per_class: 50
  image_size: 64
  images_per_batch: 16
  steps_per_epoch: 30
  encode_batch_size: 8

training:
  k: 10

  # Warmup：冻结 backbone，只训投射头 + 原型，不破坏 Qwen 预训练特征
  warmup_epochs: 3
  warmup_freeze_backbone: true
  lr: 1.0e-4
  lr_proj: 3.0e-4
  lr_proto: 3.0e-4
  weight_decay: 0.01
  grad_accum_steps: 2
  max_grad_norm: 1.0
  warmup_temperature: 0.1
  sinkhorn_epsilon: 0.05
  sinkhorn_iters: 3
  rl_from_warmup_best: true
  warmup_acc_floor: 0.0        # 关掉 floor 早停，让 warmup 跑完
  warmup_early_stop_on_drop: false

  # RL：迭代增加，加入边际熵防塌缩
  rl_iterations: 200
  rl_eval_every: 10
  early_stop_patience: 20

  policy_standardize: true
  temperature: 0.3
  group_size: 8
  reward_mode: sinkhorn
  normalize_adv: true
  adv_eps: 1.0e-2

  ppo_epochs: 4
  ppo_clip: 0.2

  balance_coef: 1.0    # 边际熵正则，显式防塌缩
  ent_coef: 0.0
  kl_coef: 0.3

  rl_lr_enc: 0
  rl_lr_proj: 3.0e-5
  rl_lr_proto: 3.0e-5
